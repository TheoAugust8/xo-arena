name: Deploy web

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Install FVM
        run: |
          dart pub global activate fvm 3.1.3
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Install project
        run: make install
      - name: Build web release
        run: fvm flutter build web --release
      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_XO_ARENA }}'
          projectId: '${{ vars.FIREBASE_PROJECT_ID }}'
          expires: 30d

  production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Install FVM
        run: |
          dart pub global activate fvm 3.1.3
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Install project
        run: make install
      - name: Build web release
        run: fvm flutter build web --release
      - name: Deploy production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_XO_ARENA }}'
          projectId: '${{ vars.FIREBASE_PROJECT_ID }}'
          channelId: live
