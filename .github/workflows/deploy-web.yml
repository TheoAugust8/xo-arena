name: Quality and deploy

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Install Linux integration test dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev xvfb
      - name: Install FVM
        run: |
          dart pub global activate fvm 3.1.3
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Install project
        run: make install
      - name: Check formatting
        run: make format-check
      - name: Analyze
        run: make analyze
      - name: Test and enforce coverage
        run: make coverage
      - name: Run Linux integration tests
        run: xvfb-run -a make integration-test DEVICE=linux
      - name: Build web release
        run: fvm flutter build web --release
      - name: Upload verified web build
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web
          retention-days: 1

  preview:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Download verified web build
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: build/web
      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_XO_ARENA }}'
          projectId: '${{ vars.FIREBASE_PROJECT_ID }}'
          expires: 30d

  production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download verified web build
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: build/web
      - name: Deploy production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_XO_ARENA }}'
          projectId: '${{ vars.FIREBASE_PROJECT_ID }}'
          channelId: live
