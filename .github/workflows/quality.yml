name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Install FVM
        run: |
          dart pub global activate fvm 3.1.3
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Install project
        run: make install
      - name: Check formatting
        run: make format-check
      - name: Analyze
        run: make analyze
      - name: Test
        run: make test
